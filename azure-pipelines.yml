# Node.js with React
# Build a Node.js project that uses React.
# Add steps that analyze code, save build artifacts, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/javascript
trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: MyVariables
  - name: NODE_VERSION
    value: '22.x'
  - name: SONAR_ORG
    value: 'jimmyhyusein' 
  - name: SONAR_PROJECT
    value: 'JimmyHyusein_TodoApp' 

steps:
- task: UseNode@1
  displayName: 'Install Node.js'
  inputs:
    version: $(NODE_VERSION)

- task: SonarCloudPrepare@3
  displayName: 'Prepare SonarCloud Analysis'
  inputs:
    SonarCloud: 'SonarCloudConnection'
    organization: $(SONAR_ORG)
    scannerMode: 'CLI'
    configMode: 'manual'
    cliProjectKey: $(SONAR_PROJECT)
    extraProperties: |
      sonar.javascript.lcov.reportPaths=**/coverage/lcov.info
      sonar.sources=.
      sonar.exclusions=**/node_modules/**,**/*.test.js

- script: |
    cd server
    npm install
    npm test
  displayName: 'Functional Tests: Server'

- script: |
    cd client
    npm install
    npm test
  displayName: 'Functional Tests: Client'
  env:
    CI: true

- task: PublishTestResults@2
  displayName: 'Publish Test Results'
  condition: succeededOrFailed()
  inputs:
    testResultsFormat: 'JUnit'
    testResultsFiles: '**/test-results/*.xml'

- task: SonarCloudAnalyze@3
  displayName: 'Run SonarCloud Analysis'

- task: SonarCloudPublish@3
  displayName: 'Publish Quality Gate Result'
  inputs:
    pollingTimeoutSec: '300'

- script: |
    cd server
    npm audit --audit-level=high
  displayName: 'Security Scan (Server)'
  continueOnError: true 

- script: |
    cd client
    npm run build
  displayName: 'Build Client'

- task: CopyFiles@2
  displayName: 'Copy Build to Staging'
  inputs:
    SourceFolder: 'client/build'
    Contents: '**'
    TargetFolder: '$(Build.ArtifactStagingDirectory)'

- task: PublishBuildArtifacts@1
  displayName: 'Publish Artifact: drop'
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)'
    ArtifactName: 'drop'
    publishLocation: 'Container'

- task: Docker@2
  displayName: 'Build and Push Docker Image'
  condition: succeeded()
  inputs:
    containerRegistry: 'MyDockerHub'  
    repository: 'nhyusein/todo-app'
    command: 'buildAndPush'
    Dockerfile: '**/Dockerfile'
    tags: |
      $(Build.BuildId)
      latest